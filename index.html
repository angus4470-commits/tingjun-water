<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="喝水紀錄">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">

<title>亭君的專屬喝水紀錄 3.0</title>
<style>
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: #E0F7FA; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    margin: 0; 
    padding: 20px 0;
  }
  .card { 
    background: white; 
    padding: 30px 20px; 
    border-radius: 20px; 
    box-shadow: 0 8px 20px rgba(0,0,0,0.05); 
    text-align: center; 
    max-width: 320px; 
    width: 90%; 
  }
  h1 { color: #00838F; font-size: 22px; margin-top: 0; }
  p.subtitle { color: #78909C; font-size: 14px; margin-bottom: 20px; }
  .status { font-size: 18px; color: #333; font-weight: bold; margin-bottom: 15px; }
  
  .progress-container { 
    width: 100%; 
    background-color: #ECEFF1; 
    border-radius: 30px; 
    margin: 20px 0; 
    height: 35px; 
    overflow: hidden;
    position: relative;
  }
  .progress-bar { 
    height: 100%; 
    background-color: #26C6DA; 
    width: 0%; 
    transition: width 0.4s ease; 
  }
  
  .buttons { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
  button { 
    flex: 1; 
    min-width: 45%; 
    padding: 12px; 
    border: none; 
    border-radius: 12px; 
    background-color: #00BCD4; 
    color: white; 
    font-size: 16px; 
    font-weight: bold;
    cursor: pointer; 
    box-shadow: 0 4px 6px rgba(0, 188, 212, 0.2);
  }
  button:active { transform: scale(0.98); }
  
  .reset-btn { background-color: #FFCDD2; color: #C62828; margin-top: 20px; box-shadow: none; width: 100%; font-size: 14px;}
  #message { margin-top: 20px; font-weight: bold; color: #D81B60; min-height: 24px; }

  /* 歷史紀錄與總和區塊的樣式 */
  .history-section {
    margin-top: 30px;
    border-top: 2px dashed #B2EBF2;
    padding-top: 20px;
    text-align: left;
  }
  .weekly-total {
    background-color: #FFF9C4;
    color: #F57F17;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
    font-size: 15px;
  }
  .history-section h3 {
    font-size: 16px;
    color: #00838F;
    margin-top: 0;
    margin-bottom: 15px;
    text-align: center;
  }
  .history-list {
    list-style: none;
    padding: 0;
    margin: 0;
    max-height: 160px;
    overflow-y: auto;
  }
  .history-list li {
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    background: #F5F5F5;
    margin-bottom: 8px;
    border-radius: 10px;
    font-size: 14px;
    color: #546E7A;
  }
  .history-list li.success {
    background: #E0F2F1;
    color: #00695C;
    font-weight: bold;
  }
  .empty-msg { text-align: center; color: #90A4AE; font-size: 13px; }
</style>
</head>
<body>

<div class="card">
  <h1>💖 亭君專屬喝水小幫手</h1>
  <p class="subtitle">男友的愛心叮嚀：今天也要乖乖喝水！</p>
  
  <div class="status">
    今日進度：<span id="currentAmount">0</span> / 750 cc
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="message"></div>

  <div class="buttons">
    <button onclick="addWater(50)">+ 50 cc<br><small>(喝一口)</small></button>
    <button onclick="addWater(150)">+ 150 cc<br><small>(半杯)</small></button>
    <button onclick="addWater(250)">+ 250 cc<br><small>(一杯)</small></button>
    <button onclick="addWater(500)">+ 500 cc<br><small>(一瓶)</small></button>
  </div>

  <button class="reset-btn" onclick="resetWater()">🔄 重新計算今日水量</button>

  <div class="history-section">
    <div class="weekly-total">
      🌟 近期累積喝水量：<span id="weeklyTotal">0</span> cc
    </div>

    <h3>📅 過去一週的紀錄</h3>
    <ul class="history-list" id="historyList">
      </ul>
  </div>
</div>

<script>
  const GOAL = 750;
  let currentAmount = 0;
  let historyData = [];
  
  function getTodayString() {
    return new Date().toLocaleDateString('zh-TW');
  }

  window.onload = function() {
    const todayStr = getTodayString();
    const savedDate = localStorage.getItem('tingjun_last_date');
    const savedAmount = localStorage.getItem('tingjun_water_today');
    const savedHistory = localStorage.getItem('tingjun_water_history');

    if (savedHistory) {
      historyData = JSON.parse(savedHistory);
    }

    if (savedDate === todayStr) {
      if (savedAmount) currentAmount = parseInt(savedAmount);
    } else {
      if (savedDate && savedAmount !== null) {
        historyData.unshift({ date: savedDate, amount: parseInt(savedAmount) });
        if (historyData.length > 7) historyData.pop();
        localStorage.setItem('tingjun_water_history', JSON.stringify(historyData));
      }
      currentAmount = 0;
      localStorage.setItem('tingjun_last_date', todayStr);
      localStorage.setItem('tingjun_water_today', currentAmount);
    }
    
    updateUI();
  }

  function addWater(amount) {
    currentAmount += amount;
    localStorage.setItem('tingjun_water_today', currentAmount);
    localStorage.setItem('tingjun_last_date', getTodayString());
    updateUI();
  }

  function resetWater() {
    if(confirm('確定要將今天的紀錄歸零重算嗎？')) {
      currentAmount = 0;
      localStorage.setItem('tingjun_water_today', currentAmount);
      updateUI();
    }
  }

  function updateUI() {
    document.getElementById('currentAmount').innerText = currentAmount;
    
    let percentage = (currentAmount / GOAL) * 100;
    if (percentage > 100) percentage = 100;
    document.getElementById('progressBar').style.width = percentage + '%';

    const msgElement = document.getElementById('message');
    if (currentAmount === 0) {
      msgElement.innerText = '快去喝今天的第一口水吧！';
    } else if (currentAmount < GOAL) {
      msgElement.innerText = '很棒！繼續保持喔！✨';
    } else {
      msgElement.innerText = '🎉 達標了！妳超棒的啦！男友愛妳！';
    }

    // 計算總累積水量 (今天 + 歷史紀錄)
    let totalWater = currentAmount;
    historyData.forEach(item => {
      totalWater += item.amount;
    });
    document.getElementById('weeklyTotal').innerText = totalWater;

    const historyList = document.getElementById('historyList');
    historyList.innerHTML = ''; 

    if (historyData.length === 0) {
      historyList.innerHTML = '<li class="empty-msg">明天再來看看，就會有紀錄囉！</li>';
    } else {
      historyData.forEach(item => {
        const li = document.createElement('li');
        const isSuccess = item.amount >= GOAL;
        if (isSuccess) li.classList.add('success');
        li.innerHTML = `<span>${item.date}</span> <span>${item.amount} cc ${isSuccess ? '✅' : '💦'}</span>`;
        historyList.appendChild(li);
      });
    }
  }
</script>

</body>
</html>
